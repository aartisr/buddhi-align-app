name: CI/CD Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Only allow one concurrent run per branch; cancel older runs on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Primary quality gate: lint → type-check → test → build
  # ──────────────────────────────────────────────────────
  quality:
    name: Quality (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint:frontend

      - name: TypeScript type-check
        run: npx --prefix apps/frontend tsc --noEmit
        continue-on-error: false

      - name: Test frontend
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build:frontend
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ──────────────────────────────────────────────────────
  # Coverage (non-blocking — informational artefact)
  # ──────────────────────────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # vitest run --coverage uses the v8 provider configured in vitest.config.ts
        run: npx --prefix apps/frontend vitest run --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/frontend/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────
  # Dependency security audit (informational only)
  # ──────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high || true

