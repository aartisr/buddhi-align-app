# ============================================================
# Netlify build configuration for Buddhi Align App
#
# The Next.js frontend (apps/frontend) is the deployed site.
# The Express backend is NOT deployed to Netlify — its CRUD
# endpoints are replaced by the Next.js API routes in
#   apps/frontend/app/api/[module]/route.ts
#   apps/frontend/app/api/[module]/[id]/route.ts
# which are automatically converted to Netlify Functions by
# @netlify/plugin-nextjs.
# ============================================================

[build]
  # Install from the monorepo root so all workspace packages are available,
  # then build only the frontend.
  command = "npm ci && npm i --no-save @next/swc-linux-x64-gnu@14.2.33 @next/swc-linux-x64-musl@14.2.33 lightningcss-linux-x64-gnu@1.32.0 lightningcss-linux-x64-musl@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.2 @tailwindcss/oxide-linux-x64-musl@4.2.2 && npm run build:frontend"
  publish  = "apps/frontend/.next"

[build.environment]
  NODE_VERSION            = "20"
  NPM_VERSION             = "9"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_CLARITY_PROJECT_ID = "w90fdbtt4x"
  COMMUNITY_INTEGRATION_PROVIDER = "discourse"
  DISCOURSE_INTEGRATION_ENABLED = "true"
  DISCOURSE_BASE_URL = "https://community.foreverlotus.com"
  NEXT_PUBLIC_DISCOURSE_COMMUNITY_URL = "https://buddhi-align.foreverlotus.com/community"
  DISCOURSE_PARENT_CATEGORY_SLUG = "buddhi-align"
  DISCOURSE_DEFAULT_CATEGORY_SLUG = "buddhi-align"
  # DATA_PROVIDER defaults to "supabase".
  # Set this (and SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY) in the
  # Netlify UI under Site -> Environment Variables.
  # Set DISCOURSE_API_KEY and DISCOURSE_SSO_SECRET in the Netlify UI too.
  DATA_PROVIDER = "supabase"

# @netlify/plugin-nextjs converts API routes, SSR pages, and middleware
# into Netlify Functions / Edge Functions automatically.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ------------------------------------------------------------
# Context overrides
# ------------------------------------------------------------
[context.deploy-preview]
  command = "npm ci && npm i --no-save @next/swc-linux-x64-gnu@14.2.33 @next/swc-linux-x64-musl@14.2.33 lightningcss-linux-x64-gnu@1.32.0 lightningcss-linux-x64-musl@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.2 @tailwindcss/oxide-linux-x64-musl@4.2.2 && npm run build:frontend"

[context.branch-deploy]
  command = "npm ci && npm i --no-save @next/swc-linux-x64-gnu@14.2.33 @next/swc-linux-x64-musl@14.2.33 lightningcss-linux-x64-gnu@1.32.0 lightningcss-linux-x64-musl@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.2 @tailwindcss/oxide-linux-x64-musl@4.2.2 && npm run build:frontend"
